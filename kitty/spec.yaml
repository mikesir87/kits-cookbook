schemaVersion: "1"
kind: mixin
name: kitty
displayName: Kitty Terminal Integration
description: Full kitty shell integration for sandboxes — terminfo, shell hooks, kitten binary, and graphics protocol support

environment:
  variables:
    KITTY_INSTALLATION_DIR: /usr/local/lib/kitty
    KITTY_SHELL_INTEGRATION: enabled
    TERM: xterm-kitty
    TERMINFO: /usr/local/share/terminfo

network:
  allowedDomains:
    - github.com
    - objects.githubusercontent.com

commands:
  install:
    - command: "apt-get update && apt-get install -y --no-install-recommends ncurses-bin curl ca-certificates xz-utils"
      description: Install dependencies (tic, curl, xz)
    - command: |
        KITTY_VERSION=${KITTY_VERSION:-0.46.2} && \
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/') && \
        curl -fsSL https://github.com/kovidgoyal/kitty/releases/download/v${KITTY_VERSION}/kitten-linux-${ARCH} -o /usr/local/bin/kitten && \
        chmod +x /usr/local/bin/kitten
      description: Download kitten standalone binary
    - command: |
        KITTY_VERSION=${KITTY_VERSION:-0.46.2} && \
        ARCH=$(uname -m | sed 's/aarch64/arm64/') && \
        curl -fsSL https://github.com/kovidgoyal/kitty/releases/download/v${KITTY_VERSION}/kitty-${KITTY_VERSION}-${ARCH}.txz -o /tmp/kitty.txz && \
        mkdir -p /tmp/kitty-extract && \
        tar xJf /tmp/kitty.txz -C /tmp/kitty-extract && \
        mkdir -p /usr/local/lib/kitty && \
        cp -r /tmp/kitty-extract/lib/kitty/shell-integration /usr/local/lib/kitty/ && \
        mkdir -p /usr/local/share/terminfo && \
        cp -r /tmp/kitty-extract/share/terminfo/* /usr/local/share/terminfo/ && \
        rm -rf /tmp/kitty.txz /tmp/kitty-extract
      description: Extract shell integration scripts and terminfo from kitty release tarball
    - command: "grep -qF 'kitty-integration-kit' /home/agent/.bashrc 2>/dev/null || echo 'source /usr/local/lib/kitty/shell-integration/bash/kitty.bash # kitty-integration-kit' >> /home/agent/.bashrc"
      user: "1000"
      description: Patch .bashrc with kitty shell integration (idempotent)
