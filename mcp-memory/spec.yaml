schemaVersion: "1"
kind: mixin
name: mcp-memory
displayName: Memory MCP Server
description: Adds the Model Context Protocol reference "memory" server so the agent has a persistent knowledge graph across sandbox restarts

network:
  allowedDomains:
    - registry.npmjs.org

commands:
  install:
    - command: "npm install -g @modelcontextprotocol/server-memory"
      description: Install the memory MCP server globally
